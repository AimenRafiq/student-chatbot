<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC IET Student Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 450px;
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #1a73e8;
            color: white;
            padding: 18px 20px;
        }

        .chat-header h2 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bot-message {
            background: #f0f2f5;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: #1a73e8;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .chat-input {
            display: flex;
            padding: 14px;
            border-top: 1px solid #eee;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #1a73e8;
        }

        .chat-input button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }

        .chat-input button:hover {
            background: #1558b0;
        }

        .suggestions {
            padding: 0 20px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion-btn {
            background: #e8f0fe;
            color: #1a73e8;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .suggestion-btn:hover {
            background: #d2e3fc;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>NFC IET Student Assistant</h2>
            <p>Ask me about admissions, fees, exams and more</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                Hello! I am your NFC IET Student Assistant. How can I help you today?
                <div class="time">Just now</div>
            </div>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('fees')">Fees</button>
            <button class="suggestion-btn" onclick="sendSuggestion('exam schedule')">Exams</button>
            <button class="suggestion-btn" onclick="sendSuggestion('library')">Library</button>
            <button class="suggestion-btn" onclick="sendSuggestion('scholarship')">Scholarship</button>
            <button class="suggestion-btn" onclick="sendSuggestion('hostel')">Hostel</button>
            <button class="suggestion-btn" onclick="sendSuggestion('admission')">Admission</button>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your question..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("userInput");
        const messages = document.getElementById("chatMessages");

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2,"0") + ":" +
                   now.getMinutes().toString().padStart(2,"0");
        }

        function addMessage(text, isUser) {
            const div = document.createElement("div");
            div.className = "message " + (isUser ? "user-message" : "bot-message");
            div.innerHTML = text + `<div class="time">${getTime()}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendSuggestion(text) {
            input.value = text;
            sendMessage();
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = "";

            fetch("/get", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            })
            .then(res => res.json())
            .then(data => addMessage(data.response, false));
        }
    </script>
</body>
</html>
